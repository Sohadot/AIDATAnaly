# AIDAtanaly.com — GitHub Pages deployment from main (PUB-REL-002)
# Builds governed dist/ on main and publishes it as a Pages artifact.
# Branch-based Pages deployment is not used.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Indexed release quality gate (builds and validates dist/)
        shell: pwsh
        run: pwsh -ExecutionPolicy Bypass -File scripts/quality-gate.ps1 -IndexedRelease

      - name: Upload Pages artifact from dist/
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
